<!DOCTYPE html>
<html lang="hy">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
    <title>Արի Ծանոթանանք</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --p: #ff5c6a; --bg: #1a1520; --card: #241e2e; --txt: #f0ebe5; }
        body { background: var(--bg); color: var(--txt); font-family: -apple-system, sans-serif; margin: 0; padding: 0; overflow: hidden; height: 100vh; }
        .page { display: none; height: 100vh; flex-direction: column; }
        .active { display: flex; }
        .auth-box { padding: 40px 20px; text-align: center; margin-top: 50px; }
        input { width: 100%; max-width: 300px; background: #362f42; border: none; padding: 15px; color: white; border-radius: 12px; margin-bottom: 10px; box-sizing: border-box; }
        #feed-cont { flex-grow: 1; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .u-card { background: var(--card); width: 100%; max-width: 400px; border-radius: 20px; overflow: hidden; box-shadow: 0 10px 20px rgba(0,0,0,0.3); text-align: center; }
        .u-img { width: 100%; height: 60vh; object-fit: cover; background: #333; }
        .btn { background: var(--p); color: white; border: none; padding: 15px 25px; border-radius: 12px; font-weight: bold; cursor: pointer; }
        .btn-gray { background: #453e50; }
        .nav { height: 70px; background: var(--card); display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #333; }
        #chat-window { flex-grow: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 10px 15px; border-radius: 15px; max-width: 80%; }
        .msg.me { align-self: flex-end; background: var(--p); }
        .msg.them { align-self: flex-start; background: #3d344d; }
    </style>
</head>
<body>

    <div id="p-auth" class="page active">
        <div class="auth-box">
            <h1 style="color: var(--p)">Արի Ծանոթանանք</h1>
            <input type="text" id="ai-n" placeholder="Անուն (Имя)">
            <input type="password" id="ai-p" placeholder="Գաղտնաբառ (Пароль)">
            <br><br><button class="btn" onclick="auth()">Մուտք / Գրանցում</button>
        </div>
    </div>

    <div id="p-feed" class="page">
        <div id="feed-cont"></div>
        <div class="nav">
            <span onclick="go('p-feed')">🎴</span>
            <span onclick="loadMatches()">💬</span>
            <span onclick="go('p-prof')">👤</span>
        </div>
    </div>

    <div id="p-matches" class="page">
        <h2 style="padding: 20px">Զրույցներ</h2>
        <div id="m-list" style="padding: 0 20px; flex-grow: 1;"></div>
        <div class="nav"><span onclick="go('p-feed')">🎴</span><span>💬</span><span onclick="go('p-prof')">👤</span></div>
    </div>

    <div id="p-chat" class="page">
        <div style="padding: 15px; background: var(--card);"><button onclick="go('p-matches')" style="background:none; border:none; color:white;">⬅ Հետ</button> <b id="chat-name"></b></div>
        <div id="chat-window"></div>
        <div style="padding: 15px; background: var(--card); display: flex; gap: 10px;">
            <input type="text" id="m-inp" style="margin:0; flex-grow: 1;" placeholder="Նամակ...">
            <button class="btn" onclick="send()">🚀</button>
        </div>
    </div>

    <div id="p-prof" class="page">
        <div style="padding: 40px; text-align: center;">
            <img id="my-p" style="width: 120px; height: 120px; border-radius: 50%; object-fit: cover; background: #333;">
            <h2 id="my-n"></h2>
            <input type="file" id="f-up" hidden onchange="up(this)">
            <button class="btn btn-gray" onclick="document.getElementById('f-up').click()">Փոխել նկարը</button>
            <br><br><button class="btn btn-gray" style="color: #ff5c6a;" onclick="location.reload()">Ելք</button>
        </div>
        <div class="nav"><span onclick="go('p-feed')">🎴</span><span onclick="loadMatches()">💬</span><span>👤</span></div>
    </div>

    <script>
        // ДАННЫЕ ВСТАВЛЕНЫ АВՏՈՄԱՏ
        const SB_URL = "https://czuqwxwueuyaetyodysi.supabase.co"; 
        const SB_KEY = "sb_publishable_qYe8ZwzWFPZGYQynxOslDA_ZPOEnrIH";
        const sb = supabase.createClient(SB_URL, SB_KEY);

        let me = null, curM = null;

        async function auth() {
            const n = document.getElementById('ai-n').value, p = document.getElementById('ai-p').value;
            if(!n || !p) return alert("Լրացրեք դաշտերը");
            let { data: u } = await sb.from('profiles').select().eq('name', n).eq('password', p).maybeSingle();
            if (!u) {
                const { data: nu } = await sb.from('profiles').insert({ name: n, password: p }).select().single();
                u = nu;
            }
            me = u;
            document.getElementById('my-n').innerText = me.name;
            document.getElementById('my-p').src = me.photos || '';
            go('p-feed'); loadFeed(); initRT();
        }

        async function loadFeed() {
            const { data: l } = await sb.from('likes').select('to_user').eq('from_user', me.id);
            const ex = (l || []).map(x => x.to_user); ex.push(me.id);
            const { data: us } = await sb.from('profiles').select().not('id', 'in', `(${ex.join(',')})`).limit(1);
            const c = document.getElementById('feed-cont');
            if (us?.[0]) {
                const u = us[0];
                c.innerHTML = `<div class="u-card"><img src="${u.photos || 'https://via.placeholder.com/400'}" class="u-img"><h3>${u.name}</h3><div style="padding-bottom:20px;"><button class="btn btn-gray" onclick="loadFeed()">👎</button> <button class="btn" onclick="like(${u.id})">❤️</button></div></div>`;
            } else c.innerHTML = "Նոր մարդիկ չկան";
        }

        async function like(id) {
            await sb.from('likes').insert({ from_user: me.id, to_user: id });
            const { data: b } = await sb.from('likes').select().eq('from_user', id).eq('to_user', me.id).maybeSingle();
            if (b) { alert("Մատչ! 🎉"); await sb.from('matches').insert({ user1: me.id, user2: id }); }
            loadFeed();
        }

        async function loadMatches() {
            go('p-matches');
            const { data: m } = await sb.from('matches').select('*, user1(*), user2(*)').or(`user1.eq.${me.id},user2.eq.${me.id}`);
            const l = document.getElementById('m-list'); l.innerHTML = '';
            m?.forEach(x => {
                const p = x.user1.id === me.id ? x.user2 : x.user1;
                const d = document.createElement('div'); d.className = 'btn btn-gray'; d.style.width = '100%'; d.style.marginBottom = '10px';
                d.innerText = p.name; d.onclick = () => openChat(x.id, p.name); l.appendChild(d);
            });
        }

        async function openChat(id, name) {
            curM = id; document.getElementById('chat-name').innerText = name; go('p-chat');
            const { data: ms } = await sb.from('messages').select().eq('match_id', id).order('created_at');
            const w = document.getElementById('chat-window'); w.innerHTML = '';
            ms?.forEach(m => addM(m));
        }

        function addM(m) {
            const w = document.getElementById('chat-window');
            const d = document.createElement('div'); d.className = `msg ${m.sender_id === me.id ? 'me' : 'them'}`;
            d.innerText = m.text; w.appendChild(d); w.scrollTop = w.scrollHeight;
        }

        async function send() {
            const i = document.getElementById('m-inp'); if(!i.value) return;
            const txt = i.value; i.value = '';
            await sb.from('messages').insert({ match_id: curM, sender_id: me.id, text: txt });
        }

        function initRT() {
            sb.channel('any').on('postgres_changes', {event:'INSERT', schema:'public', table:'messages'}, p => {
                if(p.new.match_id === curM) addM(p.new);
            }).subscribe();
        }

        async function up(input) {
            const f = input.files[0]; if(!f) return;
            const n = `${Date.now()}.jpg`;
            await sb.storage.from('photos').upload(n, f);
            const { data } = sb.storage.from('photos').getPublicUrl(n);
            await sb.from('profiles').update({ photos: data.publicUrl }).eq('id', me.id);
            document.getElementById('my-p').src = data.publicUrl;
        }

        function go(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }
    </script>
</body>
</html>
