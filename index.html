<!DOCTYPE html>
<html lang="hy">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,minimum-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
<title>Hay Dating</title>
<link rel="manifest" href="manifest.json">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Hay Dating">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="theme-color" content="#1e1710">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
  --bg:#1e1710;--s1:#2a2118;--s2:#342a20;--s3:#3e3428;
  --ac:#e85d4a;--ac2:#f07862;--grn:#5db87a;--blu:#5a8ec4;--vio:#9478c4;--gld:#d4a040;--wh:#f0e8de;
  --t1:#f0e8de;--t2:rgba(240,232,222,.6);--t3:rgba(240,232,222,.28);--t4:rgba(240,232,222,.1);
  --brd:rgba(255,255,255,.08);--grad:linear-gradient(135deg,#e85d4a,#f07862);
  --sb:env(safe-area-inset-bottom,0px);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);font-family:-apple-system,BlinkMacSystemFont,'SF Pro','Segoe UI',sans-serif;color:var(--t1);touch-action:manipulation;-webkit-font-smoothing:antialiased}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,textarea,select{font-family:inherit}

/* === LAYOUT === */
#app{display:none;height:100dvh;flex-direction:column}
#app.on{display:flex}
.cnt{flex:1;overflow:hidden;position:relative}
.tab{display:none;position:absolute;inset:0;flex-direction:column;overflow:hidden}
.tab.on{display:flex}

/* === NAV === */
.nav{display:flex;background:var(--s1);border-top:1px solid var(--brd);flex-shrink:0;padding:4px 0 calc(4px + var(--sb))}
.nv{flex:1;display:flex;flex-direction:column;align-items:center;gap:1px;padding:8px 0;position:relative}
.nv svg{width:24px;height:24px;fill:var(--t3);transition:.3s}
.nv span{font-size:9px;font-weight:600;color:var(--t3);letter-spacing:.5px}
.nv.on svg{fill:var(--ac)}
.nv.on span{color:var(--ac)}
.nv .bdg{position:absolute;top:2px;right:calc(50% - 20px);min-width:16px;height:16px;border-radius:8px;background:var(--ac);font-size:9px;font-weight:700;color:#fff;display:none;align-items:center;justify-content:center;padding:0 4px}
.nv .bdg.on{display:flex}

/* === WELCOME === */
#W{position:fixed;inset:0;z-index:100;display:flex;align-items:center;justify-content:center;padding:20px;background:var(--bg)}
#W.h{display:none}
.wc{width:100%;max-width:360px;text-align:center}
.wc h1{font-size:28px;font-weight:800;margin-bottom:2px}.wc h1 b{color:var(--ac)}
.wc p{font-size:13px;color:var(--t3);margin-bottom:28px}
.wcard{background:var(--s1);border:1px solid var(--brd);border-radius:20px;padding:24px 20px;text-align:left}
.wf{margin-bottom:12px}
.wf label{display:block;font-size:12px;font-weight:600;color:var(--t2);margin-bottom:5px}
.wf input,.wf select{width:100%;background:var(--s2);border:1px solid var(--brd);border-radius:12px;padding:12px 14px;font-size:16px;color:var(--t1);outline:none}
.wf input:focus{border-color:rgba(232,93,74,.4)}
.wf input::placeholder{color:var(--t3)}
.wf select{appearance:none}
.wf select option{background:var(--s1);color:var(--t1)}
.wr{display:flex;gap:10px}.wr .wf{flex:1}
.wb{width:100%;padding:14px;border-radius:12px;font-size:15px;font-weight:700;color:#fff;background:var(--grad);margin-top:4px}
.wb:active{opacity:.9;transform:scale(.98)}
.we{color:var(--ac);font-size:12px;text-align:center;margin-top:8px;display:none}

/* === HDR === */
.hdr{padding:12px 16px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.hdr h2{font-size:20px;font-weight:800}.hdr h2 b{color:var(--ac)}
.ibtn{width:36px;height:36px;border-radius:50%;background:var(--s2);display:flex;align-items:center;justify-content:center}
.ibtn svg{width:18px;height:18px;fill:var(--t2)}

/* === CARDS === */
.crds{flex:1;position:relative;overflow:hidden;padding:0 12px}
.cd{position:absolute;width:calc(100% - 24px);height:100%;background:var(--s1);border-radius:20px;overflow:hidden;border:1px solid var(--brd);touch-action:none;user-select:none;display:flex;flex-direction:column;box-shadow:0 8px 30px rgba(0,0,0,.3)}
.cd.snp{transition:transform .5s cubic-bezier(.34,1.56,.64,1)}
.cd.el{transition:transform .4s ease;transform:translateX(-160%) rotate(-25deg)!important;opacity:0}
.cd.er{transition:transform .4s ease;transform:translateX(160%) rotate(25deg)!important;opacity:0}
.cd-img{width:100%;height:55%;background:var(--s2);display:flex;align-items:center;justify-content:center;flex-shrink:0;position:relative;background-size:cover;background-position:center}
.cd-ini{font-size:48px;font-weight:800;color:var(--t4);white-space:nowrap}
.cd-ov{position:absolute;bottom:0;left:0;right:0;padding:16px;background:linear-gradient(transparent,rgba(0,0,0,.8))}
.cd-nm{font-size:22px;font-weight:800;color:#fff;white-space:nowrap}
.cd-age{font-weight:300;opacity:.6;margin-left:6px}
.cd-mt{display:flex;gap:12px;margin-top:4px}
.cd-mi{font-size:12px;color:rgba(255,255,255,.5);white-space:nowrap}
.cd-bd{padding:12px 16px;overflow-y:auto;flex:1}
.cd-bio{font-size:13px;color:var(--t2);line-height:1.6;margin-bottom:10px}
.cd-tgs{display:flex;flex-wrap:wrap;gap:5px}
.tg{padding:4px 10px;border-radius:14px;font-size:11px;font-weight:600;white-space:nowrap;background:rgba(232,93,74,.08);color:var(--ac2)}
.stmp{position:absolute;top:25%;font-size:24px;font-weight:800;padding:8px 14px;border-radius:10px;border:3px solid;opacity:0;pointer-events:none;z-index:5;letter-spacing:2px}
.stmp.y{right:14px;color:var(--grn);border-color:var(--grn);transform:rotate(10deg)}
.stmp.n{left:14px;color:var(--ac);border-color:var(--ac);transform:rotate(-10deg)}
.epty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;padding:40px}
.epty p{font-size:13px;color:var(--t3);text-align:center}
.sact{display:flex;justify-content:center;align-items:center;gap:14px;padding:10px 0 6px;flex-shrink:0}
.sa{border-radius:50%;display:flex;align-items:center;justify-content:center;background:var(--s1);border:1px solid var(--brd);box-shadow:0 4px 12px rgba(0,0,0,.2)}
.sa:active{transform:scale(.85)}.sa svg{fill:currentColor}
.sa.sm{width:42px;height:42px;color:var(--t3)}.sa.sm svg{width:18px;height:18px}
.sa.lg{width:56px;height:56px}.sa.lg svg{width:26px;height:26px}
.sa.no{color:var(--ac)}.sa.yes{color:var(--grn)}.sa.st{color:var(--vio)}

/* === CHAT LIST === */
.clist{flex:1;overflow-y:auto;padding:0 12px 12px}
.ci{display:flex;align-items:center;gap:12px;padding:12px 8px;border-radius:14px;cursor:pointer}
.ci:active{background:rgba(255,255,255,.02)}
.cav{width:46px;height:46px;min-width:46px;border-radius:50%;background:var(--s2);display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;color:var(--t3);white-space:nowrap;overflow:hidden;background-size:cover;background-position:center;position:relative}
.cav .dot{position:absolute;bottom:0;right:0;width:12px;height:12px;border-radius:50%;background:var(--grn);border:2px solid var(--bg)}
.cinf{flex:1;min-width:0}.cinm{font-size:14px;font-weight:600;white-space:nowrap}.cipr{font-size:12px;color:var(--t3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px}
.citm{font-size:10px;color:var(--t3)}

/* === CHAT SCREEN === */
#CS{display:none;position:fixed;top:0;left:0;width:100%;height:100dvh;z-index:999;flex-direction:column;background:var(--bg)}
#CS.on{display:flex}
.cH{padding:8px 12px;background:var(--s1);border-bottom:1px solid var(--brd);display:flex;align-items:center;gap:10px;flex-shrink:0}
.cH-bk{padding:6px}
.cH-bk svg{width:22px;height:22px;fill:var(--t2)}
.cH-av{width:34px;height:34px;min-width:34px;border-radius:50%;background:var(--s2);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:var(--t3);white-space:nowrap;overflow:hidden;background-size:cover;background-position:center;cursor:pointer}
.cH-i{flex:1;min-width:0}.cH-nm{font-size:14px;font-weight:600;white-space:nowrap}.cH-st{font-size:11px;color:var(--grn)}
.cH-acts{display:flex;gap:4px}
.cH-b{width:32px;height:32px;border-radius:50%;background:var(--s2);display:flex;align-items:center;justify-content:center}
.cH-b svg{width:16px;height:16px;fill:var(--t2)}
.cH-b.red svg{fill:var(--ac)}
.mgs{flex:1;overflow-y:auto;padding:10px 10px 6px;display:flex;flex-direction:column;gap:3px}
.mgs::-webkit-scrollbar{width:0}
.mr{display:flex;align-items:flex-end;gap:6px;animation:mA .25s ease}
.mr.me{flex-direction:row-reverse}
@keyframes mA{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.m-av{width:26px;height:26px;min-width:26px;border-radius:50%;background:var(--s2);display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:var(--t3);flex-shrink:0;white-space:nowrap;overflow:hidden;background-size:cover;background-position:center;margin-bottom:14px}
.bb{max-width:75%;min-width:50px;padding:9px 13px 4px;border-radius:18px;font-size:14px;line-height:1.5;overflow-wrap:break-word}
.bb.th{background:var(--s2);border-bottom-left-radius:4px}
.bb.me{background:var(--ac);color:#fff;border-bottom-right-radius:4px}
.bt{font-size:9px;opacity:.45;margin-top:2px;padding-bottom:2px}
.mr.me .bt{text-align:right}
.cIw{padding:6px 10px calc(6px + var(--sb));border-top:1px solid var(--brd);background:var(--s1);flex-shrink:0}
.cIr{display:flex;align-items:flex-end;gap:8px}
.cIn{flex:1;background:var(--s2);border:1px solid var(--brd);border-radius:20px;padding:9px 14px;font-size:15px;color:var(--t1);outline:none;resize:none;max-height:100px;line-height:1.4}
.cIn::placeholder{color:var(--t3)}
.cIn:focus{border-color:rgba(232,93,74,.3)}
.cSn{width:38px;height:38px;border-radius:50%;background:var(--ac);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.cSn svg{width:18px;height:18px;fill:#fff}
.cSn:active{transform:scale(.88)}

/* === PROFILE === */
.psc{flex:1;overflow-y:auto;padding:0 14px 20px}
.ph{display:flex;flex-direction:column;align-items:center;padding:16px 0 20px}
.pav{width:90px;height:90px;border-radius:50%;background:var(--s2);display:flex;align-items:center;justify-content:center;font-size:34px;font-weight:800;color:var(--t4);border:2px solid var(--brd);position:relative;white-space:nowrap;overflow:hidden;margin-bottom:10px;background-size:cover;background-position:center;cursor:pointer}
.pav .cam{position:absolute;bottom:0;right:0;width:28px;height:28px;border-radius:50%;background:var(--ac);display:flex;align-items:center;justify-content:center;border:2px solid var(--bg)}
.pav .cam svg{width:14px;height:14px;fill:#fff}
.pnm{font-size:20px;font-weight:800;white-space:nowrap}
.pct{font-size:12px;color:var(--t3);margin-top:2px}
.ps{margin-bottom:14px}
.psl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--t3);margin-bottom:8px;padding-left:2px}
.pr{background:var(--s1);border:1px solid var(--brd);border-radius:12px;padding:11px 14px;margin-bottom:5px;display:flex;justify-content:space-between;align-items:center}
.prl{font-size:12px;color:var(--t2)}.prv{font-size:13px;font-weight:600;white-space:nowrap}
.pr.ck{cursor:pointer}.pr.ck:active{background:var(--s2)}
.pef{margin-bottom:10px}
.pef label{display:block;font-size:11px;font-weight:600;color:var(--t2);margin-bottom:4px}
.pef input,.pef textarea{width:100%;background:var(--s2);border:1px solid var(--brd);border-radius:10px;padding:10px 12px;font-size:14px;color:var(--t1);outline:none}
.pef textarea{resize:none;height:70px}
.pef input:focus,.pef textarea:focus{border-color:rgba(232,93,74,.35)}
.psv{width:100%;padding:12px;border-radius:12px;font-size:14px;font-weight:700;background:var(--grad);color:#fff}
.psv:active{transform:scale(.98)}
.pout{width:100%;padding:11px;border-radius:12px;font-size:13px;font-weight:600;color:var(--ac);border:1px solid rgba(232,93,74,.15);margin-top:8px;text-align:center;background:rgba(232,93,74,.04)}

/* === CALL === */
.cov{display:none;position:fixed;inset:0;z-index:9999;background:var(--bg);flex-direction:column;align-items:center;justify-content:center}
.cov.on{display:flex}
.c-av{width:90px;height:90px;border-radius:50%;background:var(--s2);display:flex;align-items:center;justify-content:center;font-size:36px;font-weight:800;color:var(--t4);position:relative;margin-bottom:16px;white-space:nowrap;overflow:hidden}
.c-rng{position:absolute;inset:-8px;border-radius:50%;border:2px solid rgba(232,93,74,.2);animation:rng 2s infinite}
.c-rng2{position:absolute;inset:-18px;border-radius:50%;border:2px solid rgba(232,93,74,.1);animation:rng 2s infinite .5s}
@keyframes rng{0%{transform:scale(1);opacity:1}100%{transform:scale(1.15);opacity:0}}
.c-nm{font-size:22px;font-weight:700;white-space:nowrap}.c-st{font-size:13px;color:var(--t2);margin-bottom:30px}
.c-tm{font-size:20px;font-weight:600;color:var(--grn);margin-bottom:24px;min-height:24px;font-variant-numeric:tabular-nums}
.c-acts{display:flex;gap:18px}
.c-rb{width:52px;height:52px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px}
.c-rb:active{transform:scale(.9)}
.c-end{background:var(--ac);color:#fff}.c-mu{background:var(--s2);border:1px solid var(--brd)}

/* === FILTER === */
.mbg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:800;align-items:flex-end;justify-content:center}
.mbg.on{display:flex}
.mbox{background:var(--s1);border-radius:20px 20px 0 0;padding:16px 18px calc(16px + var(--sb));width:100%;max-width:440px;animation:shu .35s ease}
@keyframes shu{from{transform:translateY(100%)}to{transform:none}}
.mhd{width:32px;height:4px;border-radius:2px;background:var(--t4);margin:0 auto 14px}
.mt{font-size:17px;font-weight:800;margin-bottom:14px}
.fg{margin-bottom:14px}.fgl{font-size:11px;font-weight:600;color:var(--t2);margin-bottom:6px}
.fgc{display:flex;gap:6px}
.fc{padding:8px 14px;border-radius:18px;border:1px solid var(--brd);font-size:12px;font-weight:600;color:var(--t2)}
.fc.on{border-color:var(--ac);color:var(--ac);background:rgba(232,93,74,.06)}
.fap{width:100%;padding:12px;border-radius:12px;font-size:14px;font-weight:700;background:var(--grad);color:#fff;margin-top:4px}
.rw{display:flex;gap:8px;align-items:center;margin-top:4px}
.rw span{font-size:10px;color:var(--t3)}
.rw input[type=range]{flex:1;-webkit-appearance:none;height:3px;background:var(--s3);border-radius:2px;outline:none}
.rw input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;border-radius:50%;background:var(--ac);border:2px solid var(--bg)}

/* === MATCH === */
.mov{display:none;position:fixed;inset:0;z-index:8000;background:rgba(14,14,24,.96);flex-direction:column;align-items:center;justify-content:center}
.mov.on{display:flex}
.mvt{font-size:28px;font-weight:800;color:var(--ac);animation:pop .5s cubic-bezier(.34,1.56,.64,1) .2s both}
.mvs{font-size:13px;color:var(--t2);margin-top:6px;animation:up .4s ease .4s both}
.mvb{margin-top:28px;padding:12px 32px;border-radius:24px;background:var(--grad);color:#fff;font-size:14px;font-weight:700;animation:up .4s ease .6s both}
@keyframes pop{from{opacity:0;transform:scale(.5)}to{opacity:1;transform:scale(1)}}
@keyframes up{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
#ptc{position:fixed;inset:0;z-index:8001;pointer-events:none}

/* === PHOTO ZOOM === */
.zoom{display:none;position:fixed;inset:0;z-index:9000;background:rgba(0,0,0,.92);align-items:center;justify-content:center;cursor:pointer}
.zoom.on{display:flex}
.zoom img{max-width:92%;max-height:85%;border-radius:12px;object-fit:contain}

/* === NOTIFY === */
.noti{position:fixed;top:0;left:0;right:0;z-index:7000;transform:translateY(-100%);transition:transform .4s cubic-bezier(.22,1,.36,1);padding:10px 14px;background:var(--s1);border-bottom:1px solid var(--brd);display:flex;align-items:center;gap:10px;cursor:pointer;box-shadow:0 4px 20px rgba(0,0,0,.3)}
.noti.on{transform:translateY(0)}
.n-av{width:36px;height:36px;min-width:36px;border-radius:50%;background:var(--s2);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:var(--t3);white-space:nowrap;overflow:hidden}
.n-b{flex:1;min-width:0}.n-a{font-size:10px;color:var(--t3)}.n-n{font-size:12px;font-weight:700}.n-t{font-size:11px;color:var(--t2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

.toast{position:fixed;top:16px;left:50%;transform:translateX(-50%) translateY(-70px);background:var(--s1);border:1px solid var(--brd);border-radius:12px;padding:10px 18px;font-size:13px;z-index:9999;transition:transform .35s cubic-bezier(.22,1,.36,1)}
.toast.on{transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>

<!-- WELCOME -->
<div id="W">
<div class="wc">
  <h1>Hay <b>Dating</b></h1>
  <p>Знакомства по-армянски</p>
  <div class="wcard">
    <div class="wf"><label>Имя</label><input id="wN" placeholder="Как тебя зовут?" maxlength="20" autocomplete="off"></div>
    <div class="wr"><div class="wf"><label>Возраст</label><input type="number" id="wA" placeholder="25" min="18" max="99"></div><div class="wf"><label>Пол</label><select id="wG"><option value="male">М</option><option value="female">Ж</option></select></div></div>
    <button class="wb" onclick="doStart()">Начать</button>
    <div class="we" id="wE"></div>
  </div>
</div></div>

<!-- APP -->
<div id="app">
<div class="cnt">
  <!-- FEED -->
  <div class="tab on" id="tF">
    <div class="hdr"><h2>Hay <b>Dating</b></h2><button class="ibtn" onclick="openFlt()"><svg viewBox="0 0 24 24"><path d="M3 5h18v2H3zm3 6h12v2H6zm3 6h6v2H9z"/></svg></button></div>
    <div class="crds" id="cW"><div class="epty" id="cE" style="display:none"><p style="font-size:32px">✨</p><p>Анкет пока нет</p></div></div>
    <div class="sact">
      <button class="sa sm st" onclick="swA('up')"><svg viewBox="0 0 24 24"><polygon points="12,2 15.09,8.26 22,9.27 17,14.14 18.18,21.02 12,17.77 5.82,21.02 7,14.14 2,9.27 8.91,8.26"/></svg></button>
      <button class="sa lg no" onclick="swA('left')"><svg viewBox="0 0 24 24"><path d="M18.3 5.7a1 1 0 00-1.4 0L12 10.6 7.1 5.7a1 1 0 00-1.4 1.4L10.6 12l-4.9 4.9a1 1 0 001.4 1.4L12 13.4l4.9 4.9a1 1 0 001.4-1.4L13.4 12l4.9-4.9a1 1 0 000-1.4z"/></svg></button>
      <button class="sa lg yes" onclick="swA('right')"><svg viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg></button>
      <button class="sa sm" style="color:var(--gld)" onclick="toast('Boost скоро!')"><svg viewBox="0 0 24 24"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg></button>
    </div>
  </div>
  <!-- CHATS -->
  <div class="tab" id="tC">
    <div class="hdr"><h2>Чаты</h2></div>
    <div class="clist" id="cL"><div class="epty" id="cLE"><p style="font-size:32px">💬</p><p>Нет совпадений</p></div></div>
  </div>
  <!-- PROFILE -->

async function doUnmatch(){
  if(!cMid||!confirm('Удалить чат?'))return;
  try{await sb.from('messages').delete().eq('match_id',cMid);await sb.from('matches').delete().eq('id',cMid);closeC();loadM();toast('Удалено');}catch(e){toast('Ошибка');}
}

// CALL
function doCall(v){if(callOn)return;isVid=!!v;callOn=true;callSec=0;document.getElementById('caAv').textContent=cPP?(cPP.name||'?').substring(0,2).toUpperCase():'?';document.getElementById('caN').textContent=cPP?cPP.name:'—';document.getElementById('caS').textContent=v?'Видеозвонок...':'Вызов...';document.getElementById('caT').textContent='';document.getElementById('callO').classList.add('on');setTimeout(function(){if(!callOn)return;document.getElementById('caS').textContent=isVid?'Видео':'Звонок';callInt=setInterval(function(){callSec++;document.getElementById('caT').textContent=fTm(callSec);},1000);},2000);}
function endC(){callOn=false;clearInterval(callInt);document.getElementById('callO').classList.remove('on');if(callSec>0)toast((isVid?'Видео':'Звонок')+' · '+fTm(callSec));callSec=0;}
function tgMu(){muted=!muted;document.getElementById('muB').textContent=muted?'🔇':'🎙';}
function fTm(s){return Math.floor(s/60)+':'+String(s%60).padStart(2,'0');}

// PHOTO ZOOM
function zoomPh(p){
  var ph=p&&p.photos?p.photos:'';
  if(!ph)return;
  document.getElementById('zoomImg').src=ph;
  document.getElementById('zoomM').classList.add('on');
}

// PROFILE
var ed=false;
function renderP(){
  if(!me)return;
  var s=document.getElementById('pS'),ini=(me.name||'?').substring(0,2).toUpperCase(),btn=document.getElementById('eBtn');
  var ph=me.photos||'';
  var avS=ph?'background-image:url('+ph+');background-size:cover;background-position:center':'';
  var avC=ph?'':ini;
  if(!ed){btn.textContent='Изменить';
    var tags=(me.interests||'').split(',').filter(Boolean).map(function(t){return'<span class="tg">'+esc(t.trim())+'</span>';}).join('')||'<span style="color:var(--t3);font-size:11px">Не указаны</span>';
    s.innerHTML='<div class="ph"><div class="pav" style="'+avS+'" onclick="zoomPh(me)">'+avC+'</div><div class="pnm">'+esc(me.name)+', '+(me.age||'')+'</div><div class="pct">'+esc(me.city||'Ереван')+'</div></div>'+
      '<div class="ps"><div class="psl">О себе</div><div class="pr" style="flex-direction:column;align-items:flex-start"><span class="prv" style="font-weight:400;color:var(--t2);line-height:1.5;font-size:12px">'+esc(me.bio||'Нажми "Изменить"')+'</span></div></div>'+
      '<div class="ps"><div class="psl">Интересы</div><div style="display:flex;flex-wrap:wrap;gap:5px">'+tags+'</div></div>'+
      '<div class="ps"><div class="psl">Инфо</div><div class="pr"><span class="prl">Пол</span><span class="prv">'+(me.gender==='male'?'М':'Ж')+'</span></div><div class="pr"><span class="prl">Возраст</span><span class="prv">'+(me.age||'—')+'</span></div><div class="pr"><span class="prl">Город</span><span class="prv">'+esc(me.city||'Ереван')+'</span></div></div>'+
      '<div class="ps"><div class="psl">Настройки</div><div class="pr ck" onclick="togEdit()"><span class="prl">Редактировать</span><span class="prv" style="color:var(--ac)">→</span></div><div class="pr ck" onclick="openFlt()"><span class="prl">Фильтры</span><span class="prv" style="color:var(--ac)">→</span></div></div>'+
      '<button class="pout" onclick="doOut()">Выйти</button>';
  }else{btn.textContent='Отмена';
    s.innerHTML='<div class="ph"><div class="pav" style="'+avS+'" onclick="document.getElementById(\'phI\').click()">'+avC+'<div class="cam"><svg viewBox="0 0 24 24"><path d="M12 15.2A3.2 3.2 0 108.8 12 3.2 3.2 0 0012 15.2zM9 2L7.17 4H4a2 2 0 00-2 2v12a2 2 0 002 2h16a2 2 0 002-2V6a2 2 0 00-2-2h-3.17L15 2z"/></svg></div></div><input type="file" id="phI" accept="image/*" style="display:none" onchange="upPh(this)"><div style="font-size:11px;color:var(--t3);margin-top:3px">Нажми на фото</div></div>'+
      '<div class="ps"><div class="psl">Редактирование</div><div class="pef"><label>Имя</label><input id="eN" value="'+esc(me.name||'')+'"></div><div class="pef"><label>Возраст</label><input type="number" id="eA" value="'+(me.age||25)+'" min="18" max="99"></div><div class="pef"><label>Город</label><input id="eCi" value="'+esc(me.city||'')+'"></div><div class="pef"><label>О себе</label><textarea id="eBi">'+esc(me.bio||'')+'</textarea></div><div class="pef"><label>Интересы</label><input id="eIn" value="'+esc(me.interests||'')+'" placeholder="Кино, Музыка..."></div><button class="psv" onclick="saveP()">Сохранить</button></div>';
  }
}
function togEdit(){ed=!ed;renderP();}
async function upPh(inp){
  var f=inp.files[0];if(!f)return;toast('Загрузка...');
  try{
    var fname=me.id+'_'+Date.now()+'.jpg';
    var r=await sb.storage.from('photos').upload(fname,f,{upsert:true});
    if(r.error){toast('Ошибка: '+r.error.message);return;}
    var u=sb.storage.from('photos').getPublicUrl(fname);
    var r2=await sb.from('profiles').update({photos:u.data.publicUrl}).eq('id',me.id).select().single();
    if(r2.data){me=r2.data;ed=false;renderP();toast('Фото ✓');}
    else toast(r2.error?r2.error.message:'Ошибка');
  }catch(e){toast('Ошибка');console.error(e);}
}
async function saveP(){
  var d={name:document.getElementById('eN').value.trim(),age:parseInt(document.getElementById('eA').value)||me.age,city:document.getElementById('eCi').value.trim(),bio:document.getElementById('eBi').value.trim(),interests:document.getElementById('eIn').value.trim()};
  var r=await sb.from('profiles').update(d).eq('id',me.id).select().single();
  if(r.data){me=r.data;ed=false;renderP();toast('Сохранено ✓');}else toast(r.error?r.error.message:'Ошибка');
}
