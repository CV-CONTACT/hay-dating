<!DOCTYPE html>
<html lang="hy">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,minimum-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
<title>Hay Dating</title>
<link rel="manifest" href="/manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Hay Dating">
<link rel="apple-touch-icon" href="/icon-192.png">
<meta name="theme-color" content="#1a1520">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#1a1520;--card:#241e2e;--card2:#2d2638;--card3:#362f42;
  --p:#ff5c6a;--coral:#ff7e7e;--rose:#e8557a;--violet:#8b6cc1;
  --mint:#2dba8e;--gold:#f0a030;
  --txt:#f0ebe5;--txt2:#b0a8b8;--txt3:#706878;--txt4:#453e50;
  --brd:rgba(255,255,255,.07);
  --grad:linear-gradient(135deg,#ff5c6a,#e8557a);
  --sh:0 4px 16px rgba(0,0,0,.2);
  --safe:env(safe-area-inset-bottom,0px);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);font-family:'Outfit',-apple-system,sans-serif;color:var(--txt);height:100dvh;overflow:hidden;touch-action:manipulation}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,textarea,select{font-family:inherit}

/* SHELL */
#app{display:none;height:100dvh;flex-direction:column}
#app.on{display:flex}
.content{flex:1;overflow:hidden;position:relative}
.tab{display:none;position:absolute;inset:0;flex-direction:column}
.tab.on{display:flex}

/* NAV */
.nav{display:flex;justify-content:space-around;align-items:center;padding:6px 0 calc(6px + var(--safe));background:var(--card);border-top:1px solid var(--brd);flex-shrink:0}
.ni{display:flex;flex-direction:column;align-items:center;gap:2px;padding:8px 20px;border-radius:16px;transition:.3s}
.ni.on{background:rgba(255,92,106,.1)}
.ni-i{font-size:22px;transition:transform .3s cubic-bezier(.34,1.56,.64,1)}
.ni-l{font-size:10px;font-weight:600;color:var(--txt3);letter-spacing:.5px;text-transform:uppercase}
.ni.on .ni-i{transform:scale(1.15)}
.ni.on .ni-l{color:var(--p)}
.ni-b{position:absolute;top:2px;right:10px;min-width:18px;height:18px;border-radius:9px;background:var(--p);font-size:10px;font-weight:700;color:#fff;display:none;align-items:center;justify-content:center;padding:0 5px}
.ni-b.on{display:flex}

/* WELCOME */
#welcome{position:fixed;inset:0;z-index:100;display:flex;align-items:center;justify-content:center;padding:24px;background:radial-gradient(circle at 30% 20%,rgba(255,92,106,.06),transparent 50%),radial-gradient(circle at 70% 80%,rgba(139,108,193,.05),transparent 50%),var(--bg)}
#welcome.hide{display:none}
.wb{display:flex;flex-direction:column;align-items:center;width:100%;max-width:380px}
.wfire{font-size:48px;margin-bottom:16px;animation:pop .6s cubic-bezier(.34,1.56,.64,1) .2s both}
.wtitle{font-size:30px;font-weight:800;letter-spacing:-.5px;margin-bottom:4px;white-space:nowrap;animation:up .6s ease .3s both}
.wtitle span{color:var(--p)}
.wsub{font-size:14px;color:var(--txt2);margin-bottom:32px;animation:up .6s ease .4s both}
@keyframes pop{from{opacity:0;transform:scale(.5)}to{opacity:1;transform:scale(1)}}
@keyframes up{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
.wcard{width:100%;background:var(--card);border:1px solid var(--brd);border-radius:24px;padding:26px 22px;box-shadow:var(--sh);animation:up .6s ease .5s both}
.wf{margin-bottom:14px}
.wf label{display:block;font-size:13px;font-weight:500;color:var(--txt2);margin-bottom:6px}
.wf input,.wf select{width:100%;background:var(--card2);border:1px solid var(--brd);border-radius:14px;padding:13px 16px;font-size:16px;color:var(--txt);outline:none;transition:.3s}
.wf input:focus{border-color:rgba(255,92,106,.4);box-shadow:0 0 0 3px rgba(255,92,106,.08)}
.wf input::placeholder{color:var(--txt3)}
.wf select{appearance:none}
.wf select option{background:var(--card);color:var(--txt)}
.wr{display:flex;gap:12px}
.wr .wf{flex:1}
.wbtn{width:100%;padding:15px;border-radius:14px;font-size:16px;font-weight:700;color:#fff;background:var(--grad);margin-top:6px;box-shadow:0 6px 20px rgba(255,92,106,.25);transition:.3s}
.wbtn:active{transform:scale(.97)}
.werr{color:var(--p);font-size:13px;text-align:center;margin-top:10px;display:none}

/* HEADER */
.hdr{padding:14px 18px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.logo{font-size:24px;font-weight:800;white-space:nowrap}.logo span{color:var(--p)}
.hbtn{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;background:var(--card2);border:1px solid var(--brd)}

/* SWIPE */
.cards{flex:1;position:relative;overflow:hidden;padding:0 14px}
.sc{position:absolute;width:calc(100% - 28px);height:100%;background:var(--card);border-radius:22px;overflow:hidden;border:1px solid var(--brd);touch-action:none;user-select:none;display:flex;flex-direction:column;box-shadow:var(--sh)}
.sc.snap{transition:transform .5s cubic-bezier(.34,1.56,.64,1)}
.sc.el{transition:transform .4s ease;transform:translateX(-160%) rotate(-25deg)!important;opacity:0}
.sc.er{transition:transform .4s ease;transform:translateX(160%) rotate(25deg)!important;opacity:0}
.sc-img{width:100%;height:55%;position:relative;overflow:hidden;background:var(--card2);display:flex;align-items:center;justify-content:center;flex-shrink:0;background-size:cover;background-position:center}
.sc-ini{font-size:52px;font-weight:800;color:var(--txt4);white-space:nowrap}
.sc-ov{position:absolute;bottom:0;left:0;right:0;padding:18px;background:linear-gradient(transparent,rgba(0,0,0,.75))}
.sc-nm{font-size:24px;font-weight:800;color:#fff;white-space:nowrap}
.sc-age{font-size:20px;font-weight:300;color:rgba(255,255,255,.6);margin-left:8px}
.sc-meta{display:flex;gap:12px;margin-top:4px}
.sc-mi{font-size:12px;color:rgba(255,255,255,.5);display:flex;align-items:center;gap:4px;white-space:nowrap}
.sc-dot{width:6px;height:6px;border-radius:50%;background:var(--mint)}
.sc-body{padding:14px 16px;overflow-y:auto;flex:1}
.sc-bio{font-size:14px;color:var(--txt2);line-height:1.6;margin-bottom:10px;overflow-wrap:break-word}
.sc-tags{display:flex;flex-wrap:wrap;gap:6px}
.tg{padding:5px 12px;border-radius:18px;font-size:11px;font-weight:600;white-space:nowrap}
.tg:nth-child(5n+1){background:rgba(255,92,106,.1);color:var(--p)}
.tg:nth-child(5n+2){background:rgba(139,108,193,.1);color:var(--violet)}
.tg:nth-child(5n+3){background:rgba(45,186,142,.1);color:var(--mint)}
.tg:nth-child(5n+4){background:rgba(240,160,48,.1);color:var(--gold)}
.tg:nth-child(5n+5){background:rgba(232,85,122,.1);color:var(--rose)}
.stamp{position:absolute;top:28%;font-size:26px;font-weight:800;padding:8px 14px;border-radius:12px;border:4px solid;opacity:0;pointer-events:none;z-index:5;letter-spacing:3px}
.stamp.y{right:16px;color:var(--mint);border-color:var(--mint);transform:rotate(12deg)}
.stamp.n{left:16px;color:var(--p);border-color:var(--p);transform:rotate(-12deg)}
.empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;padding:40px}
.empty i{font-size:48px;font-style:normal;animation:fl 3s ease-in-out infinite}
@keyframes fl{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.empty p{font-size:14px;color:var(--txt3);text-align:center;line-height:1.6}
.sbtns{display:flex;justify-content:center;align-items:center;gap:12px;padding:10px 0 6px;flex-shrink:0}
.sb{border-radius:50%;display:flex;align-items:center;justify-content:center;background:var(--card);border:1px solid var(--brd);box-shadow:var(--sh);transition:.3s cubic-bezier(.34,1.56,.64,1)}
.sb:active{transform:scale(.85)}
.sb.s{width:44px;height:44px;font-size:16px}
.sb.l{width:58px;height:58px;font-size:24px}
.sb.no{color:var(--p)}
.sb.yes{color:var(--mint)}
.sb.star{color:var(--violet)}

/* CHATS LIST */
.chl{flex:1;overflow-y:auto;padding:0 14px 14px}
.chi{display:flex;align-items:center;gap:12px;padding:14px 10px;border-radius:16px;margin-bottom:4px;cursor:pointer;transition:.2s}
.chi:active{background:rgba(255,92,106,.04)}
.chav{width:48px;height:48px;min-width:48px;border-radius:50%;background:var(--card2);display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;color:var(--txt3);white-space:nowrap;overflow:hidden;background-size:cover;background-position:center;border:2px solid var(--brd);position:relative}
.chdot{position:absolute;bottom:0;right:0;width:12px;height:12px;border-radius:50%;background:var(--mint);border:2px solid var(--bg)}
.chinf{flex:1;min-width:0}
.chnm{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.chpr{font-size:12px;color:var(--txt3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px}
.chtm{font-size:11px;color:var(--txt3)}

/* CHAT SCREEN */
#chatS{display:none;position:fixed;inset:0;z-index:60;flex-direction:column;background:var(--bg)}
#chatS.on{display:flex}
.cthdr{padding:10px 14px;background:var(--card);border-bottom:1px solid var(--brd);display:flex;align-items:center;gap:10px;flex-shrink:0}
.ctback{font-size:20px;padding:6px;color:var(--txt2)}
.ctav{width:36px;height:36px;min-width:36px;border-radius:50%;background:var(--card2);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:var(--txt3);white-space:nowrap;overflow:hidden}
.ctinf{flex:1}.ctnm{font-size:15px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.ctst{font-size:11px;color:var(--mint)}
.ctbtns{display:flex;gap:5px}
.ctb{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;background:var(--card2);border:1px solid var(--brd)}
.msgs{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:5px}
.msgs::-webkit-scrollbar{width:0}
.mr{display:flex;align-items:flex-end;animation:ms .3s ease}
.mr.me{flex-direction:row-reverse}
@keyframes ms{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.bb{max-width:78%;min-width:60px;padding:10px 14px 6px;border-radius:18px;font-size:14px;line-height:1.55;overflow-wrap:break-word;word-break:normal}
.bb.th{background:var(--card2);border:1px solid var(--brd);border-bottom-left-radius:4px}
.bb.me{background:var(--grad);color:#fff;border-bottom-right-radius:4px}
.bt{font-size:10px;color:rgba(255,255,255,.4);margin-top:4px}.mr.me .bt{text-align:right}.bb.th .bt{color:var(--txt3)}
.ctinpw{padding:8px 12px calc(8px + var(--safe));border-top:1px solid var(--brd);background:var(--bg);flex-shrink:0;position:relative;z-index:5}
.ctinpr{display:flex;align-items:flex-end;gap:8px}
.ctinp{flex:1;background:var(--card2);border:1px solid var(--brd);border-radius:22px;padding:10px 16px;font-size:16px;color:var(--txt);outline:none;resize:none;max-height:100px;line-height:1.4}
.ctinp::placeholder{color:var(--txt3)}
.ctinp:focus{border-color:rgba(255,92,106,.3)}
.ctsend{width:40px;height:40px;border-radius:50%;background:var(--grad);display:flex;align-items:center;justify-content:center;font-size:16px;color:#fff;flex-shrink:0;box-shadow:0 3px 12px rgba(255,92,106,.2)}
.ctsend:active{transform:scale(.88)}

/* PROFILE */
.prscr{flex:1;overflow-y:auto;padding:0 16px 24px}
.prh{display:flex;flex-direction:column;align-items:center;padding:20px 0 24px}
.prav{width:96px;height:96px;border-radius:50%;background:var(--card2);display:flex;align-items:center;justify-content:center;font-size:36px;font-weight:800;color:var(--txt4);border:3px solid var(--brd);position:relative;white-space:nowrap;overflow:hidden;margin-bottom:12px;background-size:cover;background-position:center}
.prcam{position:absolute;bottom:0;right:0;width:30px;height:30px;border-radius:50%;background:var(--grad);display:flex;align-items:center;justify-content:center;font-size:13px;border:3px solid var(--bg);color:#fff}
.prnm{font-size:22px;font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.prct{font-size:13px;color:var(--txt3);margin-top:4px}
.ps{margin-bottom:16px}
.psl{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--txt3);margin-bottom:8px;padding-left:4px}
.psr{background:var(--card);border:1px solid var(--brd);border-radius:14px;padding:12px 16px;margin-bottom:6px;display:flex;justify-content:space-between;align-items:center}
.psrl{font-size:13px;color:var(--txt2)}.psrv{font-size:14px;font-weight:600;white-space:nowrap}
.psr.clk{cursor:pointer}.psr.clk:active{background:var(--card2)}
.pef{margin-bottom:12px}
.pef label{display:block;font-size:12px;font-weight:500;color:var(--txt2);margin-bottom:6px}
.pef input,.pef textarea{width:100%;background:var(--card2);border:1px solid var(--brd);border-radius:12px;padding:12px 14px;font-size:14px;color:var(--txt);outline:none}
.pef textarea{resize:none;height:80px}
.pef input:focus,.pef textarea:focus{border-color:rgba(255,92,106,.35)}
.prsave{width:100%;padding:14px;border-radius:14px;font-size:15px;font-weight:700;background:var(--grad);color:#fff;box-shadow:0 4px 16px rgba(255,92,106,.2)}
.prsave:active{transform:scale(.98)}
.prout{width:100%;padding:13px;border-radius:14px;font-size:14px;font-weight:600;color:var(--p);border:1px solid rgba(255,92,106,.15);margin-top:10px;text-align:center;background:rgba(255,92,106,.05)}

/* CALL */
.cov{display:none;position:fixed;inset:0;z-index:200;background:linear-gradient(180deg,var(--bg),var(--card));flex-direction:column;align-items:center;justify-content:center}
.cov.on{display:flex}
.cavb{width:100px;height:100px;border-radius:50%;background:var(--card2);display:flex;align-items:center;justify-content:center;font-size:40px;font-weight:800;color:var(--txt4);position:relative;margin-bottom:20px;white-space:nowrap;overflow:hidden}
.cring{position:absolute;inset:-10px;border-radius:50%;border:2px solid rgba(255,92,106,.25);animation:rp 2s infinite}
.cring2{position:absolute;inset:-22px;border-radius:50%;border:2px solid rgba(255,92,106,.12);animation:rp 2s infinite .5s}
@keyframes rp{0%{transform:scale(1);opacity:1}100%{transform:scale(1.2);opacity:0}}
.cnm{font-size:24px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.cstat{font-size:14px;color:var(--txt2);margin-bottom:36px}
.ctmr{font-size:20px;font-weight:600;color:var(--mint);margin-bottom:28px;min-height:26px;font-variant-numeric:tabular-nums}
.cacts{display:flex;gap:20px}
.crb{width:56px;height:56px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:22px}
.crb:active{transform:scale(.9)}
.cend{background:var(--p);color:#fff;box-shadow:0 4px 16px rgba(255,92,106,.4)}
.cmute{background:var(--card);border:1px solid var(--brd)}

/* FILTER */
.mbg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:80;align-items:flex-end;justify-content:center}
.mbg.on{display:flex}
.mbox{background:var(--card);border:1px solid var(--brd);border-radius:24px 24px 0 0;padding:20px;width:100%;max-width:480px;animation:shu .4s ease}
@keyframes shu{from{transform:translateY(100%)}to{transform:none}}
.mhd{width:36px;height:4px;border-radius:2px;background:var(--txt4);margin:0 auto 16px}
.mt{font-size:18px;font-weight:800;margin-bottom:16px}
.fg{margin-bottom:16px}
.fgl{font-size:12px;font-weight:600;color:var(--txt2);margin-bottom:8px}
.fgc{display:flex;gap:8px}
.fc{padding:9px 16px;border-radius:20px;border:1px solid var(--brd);font-size:13px;font-weight:600;color:var(--txt2);transition:.3s}
.fc.on{border-color:var(--p);color:var(--p);background:rgba(255,92,106,.08)}
.fapply{width:100%;padding:14px;border-radius:14px;font-size:15px;font-weight:700;background:var(--grad);color:#fff;margin-top:6px}
.rw{display:flex;gap:10px;align-items:center;margin-top:6px}
.rw span{font-size:11px;color:var(--txt3)}
.rw input[type=range]{flex:1;-webkit-appearance:none;height:4px;background:var(--card3);border-radius:2px;outline:none}
.rw input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:20px;height:20px;border-radius:50%;background:var(--p);border:3px solid var(--bg);box-shadow:0 2px 8px rgba(255,92,106,.3)}

/* MATCH */
.mov{display:none;position:fixed;inset:0;z-index:250;background:rgba(26,21,32,.95);backdrop-filter:blur(12px);flex-direction:column;align-items:center;justify-content:center}
.mov.on{display:flex}
.mvt{font-size:32px;font-weight:800;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;animation:pop .6s cubic-bezier(.34,1.56,.64,1) .2s both}
.mvs{font-size:14px;color:var(--txt2);margin-top:8px;animation:up .5s ease .4s both}
.mvb{margin-top:32px;padding:14px 36px;border-radius:28px;background:var(--grad);color:#fff;font-size:15px;font-weight:700;box-shadow:0 6px 20px rgba(255,92,106,.25);animation:up .5s ease .6s both}
#ptc{position:fixed;inset:0;z-index:251;pointer-events:none}

/* NOTIFY */
.noti{position:fixed;top:0;left:0;right:0;z-index:300;transform:translateY(-100%);transition:transform .4s cubic-bezier(.22,1,.36,1);padding:12px 16px;background:var(--card);border-bottom:1px solid var(--brd);display:flex;align-items:center;gap:12px;cursor:pointer;box-shadow:0 4px 20px rgba(0,0,0,.2)}
.noti.on{transform:translateY(0)}
.noti-av{width:40px;height:40px;min-width:40px;border-radius:50%;background:var(--card2);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:var(--txt3);white-space:nowrap;overflow:hidden}
.noti-b{flex:1;min-width:0}
.noti-a{font-size:11px;color:var(--txt3)}
.noti-n{font-size:13px;font-weight:700}
.noti-t{font-size:12px;color:var(--txt2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* TOAST */
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%) translateY(-80px);background:var(--card);border:1px solid var(--brd);border-radius:14px;padding:11px 20px;font-size:13px;font-weight:500;z-index:300;transition:transform .4s cubic-bezier(.22,1,.36,1);box-shadow:var(--sh)}
.toast.on{transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>

<div id="welcome">
  <div class="wb">
    <div class="wfire">🔥</div>
    <div class="wtitle">Hay <span>Dating</span></div>
    <div class="wsub">Знакомства по-армянски</div>
    <div class="wcard">
      <div class="wf"><label>Имя</label><input type="text" id="wN" placeholder="Как тебя зовут?" maxlength="20" autocomplete="off"></div>
      <div class="wr">
        <div class="wf"><label>Возраст</label><input type="number" id="wA" placeholder="25" min="18" max="99"></div>
        <div class="wf"><label>Пол</label><select id="wG"><option value="male">М</option><option value="female">Ж</option></select></div>
      </div>
      <button class="wbtn" onclick="doStart()">Начать</button>
      <div class="werr" id="wE"></div>
    </div>
  </div>
</div>

<div id="app">
  <div class="content">
    <div class="tab on" id="tFeed">
      <div class="hdr"><div class="logo">Hay <span>Dating</span></div><button class="hbtn" onclick="openFlt()">⚙</button></div>
      <div class="cards" id="cW"><div class="empty" id="cE" style="display:none"><i>✨</i><p>Новых анкет нет<br><small style="opacity:.5">Заходи позже!</small></p></div></div>
      <div class="sbtns">
        <button class="sb s star" onclick="swA('up')">⭐</button>
        <button class="sb l no" onclick="swA('left')">✕</button>
        <button class="sb l yes" onclick="swA('right')">♥</button>
        <button class="sb s" style="color:var(--gold)" onclick="toast('Boost скоро!')">⚡</button>
      </div>
    </div>
    <div class="tab" id="tChat">
      <div class="hdr"><div class="logo">Сообщения</div></div>
      <div class="chl" id="cL"><div class="empty" id="cLE"><i>💬</i><p>Нет совпадений<br><small style="opacity:.5">Лайкай — тут появятся чаты</small></p></div></div>

function initRT(){

      const m=p.new;

      }
    })

      const m=p.new;
      if(m.user1===me.id||m.user2===me.id) loadM();
    })
    // NEW LIKES — check for mutual (someone liked us)
    .on('postgres_changes',{event:'INSERT',schema:'public',table:'likes'},p=>{

      if(l.to_user===me.id){
        // Someone liked us — refresh cards in case match happened
        loadM();
      }

}

  }else{btn.textContent='Отмена';
    s.innerHTML=`<div class="prh"><div class="prav" style="${avS}" onclick="document.getElementById('phI').click()">${avC}<div class="prcam">📷</div></div><input type="file" id="phI" accept="image/*" style="display:none" onchange="upPh(this)"><div style="font-size:12px;color:var(--txt3);margin-top:4px">Нажми на аватар</div></div>
      <div class="ps"><div class="psl">Редактирование</div><div class="pef"><label>Имя</label><input id="eN" value="${esc(me.name||'')}"></div><div class="pef"><label>Возраст</label><input type="number" id="eA" value="${me.age||25}" min="18" max="99"></div><div class="pef"><label>Город</label><input id="eC" value="${esc(me.city||'')}"></div><div class="pef"><label>О себе</label><textarea id="eB">${esc(me.bio||'')}</textarea></div><div class="pef"><label>Интересы</label><input id="eI" value="${esc(me.interests||'')}" placeholder="Кино, Музыка..."></div><button class="prsave" onclick="saveP()">Сохранить</button></div>`;
  }
}
function togEdit(){ed=!ed;renderP();}
function upPh(inp){const f=inp.files[0];if(!f)return;toast('Загрузка...');const rd=new FileReader();rd.onload=function(e){const img=new Image();img.onload=function(){const cv=document.createElement('canvas');const mx=200;let w=img.width,h=img.height;if(w>h){h=Math.round(h*(mx/w));w=mx;}else{w=Math.round(w*(mx/h));h=mx;}cv.width=w;cv.height=h;cv.getContext('2d').drawImage(img,0,0,w,h);const d=cv.toDataURL('image/jpeg',.5);
  sb.from('profiles').update({photos:d}).eq('id',me.id).select().single().then(({data,error})=>{console.log('Photo upload:',d.length,'chars',error);if(data){me=data;ed=false;renderP();toast('Фото ✓');}else{toast(error?error.message:'Ошибка');console.error('Photo error:',error);}});};img.src=e.target.result;};rd.readAsDataURL(f);}
async function saveP(){const d={name:document.getElementById('eN').value.trim(),age:parseInt(document.getElementById('eA').value)||me.age,city:document.getElementById('eC').value.trim(),bio:document.getElementById('eB').value.trim(),interests:document.getElementById('eI').value.trim()};
  const{data,error}=await sb.from('profiles').update(d).eq('id',me.id).select().single();if(data){me=data;ed=false;renderP();toast('Сохранено ✓');}else toast(error?error.message:'Ошибка');}
function doOut(){localStorage.removeItem('huid');location.reload();}

function aFlt(){document.getElementById('fM').classList.remove('on');loadC();}

// NOTIFY
let _ac=null;
function getAC(){if(!_ac)try{_ac=new(window.AudioContext||window.webkitAudioContext)();}catch(e){}return _ac;}
document.addEventListener('touchstart',function(){const a=getAC();if(a&&a.state==='suspended')a.resume();},{once:false});
document.addEventListener('click',function(){const a=getAC();if(a&&a.state==='suspended')a.resume();},{once:false});
document.addEventListener('touchend',function(){const a=getAC();if(a&&a.state==='suspended')a.resume();},{once:false});
function playS(){try{const a=getAC();if(!a)return;if(a.state==='suspended')a.resume();const o=a.createOscillator(),g=a.createGain();o.connect(g);g.connect(a.destination);o.frequency.setValueAtTime(880,a.currentTime);o.frequency.setValueAtTime(1100,a.currentTime+.1);g.gain.setValueAtTime(.15,a.currentTime);g.gain.exponentialRampToValueAtTime(.01,a.currentTime+.4);o.start(a.currentTime);o.stop(a.currentTime+.4);}catch(e){console.log('Sound error:',e);}}
function vib(){try{if(navigator.vibrate)navigator.vibrate([100,50,100]);}catch(e){}}
function showN(name,text,pid){document.getElementById('nAv').textContent=(name||'?').substring(0,2).toUpperCase();document.getElementById('nNm').textContent=name;document.getElementById('nTx').textContent=text;lastNP=pid;document.getElementById('noti').classList.add('on');playS();vib();if(nfTm)clearTimeout(nfTm);nfTm=setTimeout(()=>document.getElementById('noti').classList.remove('on'),4000);}
function nClick(){document.getElementById('noti').classList.remove('on');if(lastNP){const m=mats.find(x=>x.pid===lastNP);if(m){openC(m);return;}}goT('chat');}
// pollN removed — using realtime

// UTIL
function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML;}
function toast(m){const t=document.getElementById('tst');t.textContent=m;t.classList.add('on');setTimeout(()=>t.classList.remove('on'),2500);}
document.getElementById('wN').addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('wA').focus();});
document.getElementById('wA').addEventListener('keydown',e=>{if(e.key==='Enter')doStart();});
// Fix keyboard on mobile
if(window.visualViewport){
  window.visualViewport.addEventListener('resize',()=>{
    const cs=document.getElementById('chatS');
    if(cs.classList.contains('on')){
      cs.style.height=window.visualViewport.height+'px';
      document.getElementById('mB').scrollTop=document.getElementById('mB').scrollHeight;

  });

    const cs=document.getElementById('chatS');
    if(cs.classList.contains('on'))cs.style.transform='translateY('+window.visualViewport.offsetTop+'px)';
  });
}
