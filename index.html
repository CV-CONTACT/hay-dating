<!DOCTYPE html>
<html lang="hy">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,minimum-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
<title>Hay Dating</title>
<link rel="manifest" href="manifest.json">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Hay Dating">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="theme-color" content="#111111">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
  --bg:#111;--bg2:#1a1a1a;--bg3:#222;--s1:#2a2a2a;
  --ac:#fe3c72;--ac2:#ff6b81;--grn:#2fdf84;--blu:#4a8fe8;--vio:#7c5cfc;--gld:#ffb800;
  --t1:#fff;--t2:#aaa;--t3:#666;--t4:#444;
  --brd:rgba(255,255,255,.08);
  --grad:linear-gradient(135deg,#fe3c72,#ff6b81);
  --sb:env(safe-area-inset-bottom,0px);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Segoe UI',sans-serif;color:var(--t1);touch-action:manipulation;-webkit-font-smoothing:antialiased}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,textarea,select{font-family:inherit;color:var(--t1)}

#app{display:none;height:100dvh;flex-direction:column}
#app.on{display:flex}
.cnt{flex:1;overflow:hidden;position:relative}
.tab{display:none;position:absolute;inset:0;flex-direction:column;overflow:hidden}
.tab.on{display:flex}

/* NAV — dark Tinder style */
.nav{display:flex;background:#0a0a0a;border-top:1px solid rgba(255,255,255,.06);flex-shrink:0;padding:4px 0 calc(4px + var(--sb))}
.nv{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:8px 0;position:relative}
.nv svg{width:24px;height:24px;fill:var(--t3);transition:.2s}
.nv span{font-size:9px;font-weight:600;color:var(--t3);letter-spacing:.3px}
.nv.on svg{fill:var(--ac)}
.nv.on span{color:var(--ac)}
.nv .bdg{position:absolute;top:2px;right:calc(50% - 20px);min-width:16px;height:16px;border-radius:8px;background:var(--ac);font-size:9px;font-weight:700;color:#fff;display:none;align-items:center;justify-content:center;padding:0 4px}
.nv .bdg.on{display:flex}

/* WELCOME */
#W{position:fixed;inset:0;z-index:100;display:flex;align-items:center;justify-content:center;padding:20px;background:linear-gradient(160deg,#1a1a1a,#111)}
#W.h{display:none}
.wc{width:100%;max-width:360px;text-align:center}
.wc h1{font-size:28px;font-weight:800;margin-bottom:2px;color:#fff}.wc h1 b{color:var(--ac)}
.wc p{font-size:13px;color:var(--t3);margin-bottom:28px}
.wcard{background:var(--bg2);border:1px solid var(--brd);border-radius:20px;padding:24px 20px;text-align:left}
.wf{margin-bottom:12px}
.wf label{display:block;font-size:12px;font-weight:600;color:var(--t2);margin-bottom:5px}
.wf input,.wf select{width:100%;background:var(--bg3);border:1px solid var(--brd);border-radius:12px;padding:12px 14px;font-size:16px;color:#fff;outline:none}
.wf input:focus{border-color:rgba(254,60,114,.5)}
.wf input::placeholder{color:var(--t3)}
.wf select{appearance:none}.wf select option{background:var(--bg2);color:#fff}
.wr{display:flex;gap:10px}.wr .wf{flex:1}
.wb{width:100%;padding:14px;border-radius:24px;font-size:15px;font-weight:700;color:#fff;background:var(--grad);margin-top:4px}
.wb:active{opacity:.9;transform:scale(.98)}
.we{color:var(--ac);font-size:12px;text-align:center;margin-top:8px;display:none}

/* HEADER — minimal dark */
.hdr{padding:10px 16px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.hdr h2{font-size:20px;font-weight:800;color:#fff}.hdr h2 b{color:var(--ac)}
.ibtn{width:36px;height:36px;border-radius:50%;background:var(--s1);display:flex;align-items:center;justify-content:center}
.ibtn svg{width:18px;height:18px;fill:var(--t2)}

/* === FULL-SCREEN CARDS === */
.crds{flex:1;position:relative;overflow:hidden;padding:0 8px 0}
.cd{position:absolute;width:calc(100% - 16px);height:100%;border-radius:14px;overflow:hidden;touch-action:none;user-select:none;display:flex;flex-direction:column;will-change:transform;background:#000}
.cd.snp{transition:transform .2s cubic-bezier(.25,.46,.45,.94)}
.cd.el{transition:transform .25s ease-out;transform:translateX(-160%) rotate(-20deg)!important;opacity:0}
.cd.er{transition:transform .25s ease-out;transform:translateX(160%) rotate(20deg)!important;opacity:0}
/* Card photo = full screen */
.cd-img{position:absolute;inset:0;background:#1a1a1a;background-size:cover;background-position:center}
.cd-ini{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:64px;font-weight:800;color:var(--t4)}
/* Photo indicator bars */
.cd-bars{position:absolute;top:6px;left:8px;right:8px;display:flex;gap:3px;z-index:4}
.cd-bar{flex:1;height:3px;border-radius:2px;background:rgba(255,255,255,.25)}
.cd-bar.on{background:rgba(255,255,255,.9)}
/* Tap zones */
.cd-tap-l,.cd-tap-r{position:absolute;top:0;height:70%;width:35%;z-index:3}
.cd-tap-l{left:0}.cd-tap-r{right:0}
/* Bottom overlay */
.cd-ov{position:absolute;bottom:0;left:0;right:0;padding:16px 16px 20px;background:linear-gradient(transparent,rgba(0,0,0,.85) 60%);z-index:2}
/* Status badge */
.cd-status{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:20px;background:rgba(47,223,132,.15);backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);margin-bottom:6px;font-size:11px;font-weight:600;color:var(--grn)}
.cd-status::before{content:'';width:7px;height:7px;border-radius:50%;background:var(--grn);flex-shrink:0}
.cd-nm{font-size:28px;font-weight:800;color:#fff;line-height:1.1}
.cd-age{font-weight:400;opacity:.7;margin-left:4px;font-size:26px}
.cd-loc{display:flex;align-items:center;gap:4px;margin-top:4px;font-size:12px;color:rgba(255,255,255,.6)}
.cd-loc svg{width:12px;height:12px;fill:rgba(255,255,255,.5)}
.cd-bio{font-size:13px;color:rgba(255,255,255,.6);margin-top:6px;line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
/* Stamps */
.stmp{position:absolute;top:30%;font-size:28px;font-weight:800;padding:10px 16px;border-radius:10px;border:4px solid;opacity:0;pointer-events:none;z-index:5;letter-spacing:3px}
.stmp.y{right:20px;color:var(--grn);border-color:var(--grn);transform:rotate(10deg)}
.stmp.n{left:20px;color:var(--ac);border-color:var(--ac);transform:rotate(-10deg)}
.epty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;padding:40px}
.epty p{font-size:13px;color:var(--t3);text-align:center}

/* 5 ACTION BUTTONS — Tinder style */
.sact{display:flex;justify-content:center;align-items:center;gap:10px;padding:10px 20px 8px;flex-shrink:0}
.sa{border-radius:50%;display:flex;align-items:center;justify-content:center;border:1px solid var(--brd);background:var(--bg2)}
.sa:active{transform:scale(.85)}
.sa svg{fill:currentColor}
.sa.xs{width:40px;height:40px}.sa.xs svg{width:16px;height:16px}
.sa.sm{width:48px;height:48px}.sa.sm svg{width:20px;height:20px}
.sa.lg{width:58px;height:58px}.sa.lg svg{width:28px;height:28px}
.sa.no{color:var(--ac);border-color:rgba(254,60,114,.3)}
.sa.yes{color:var(--grn);border-color:rgba(47,223,132,.3)}
.sa.st{color:var(--blu);border-color:rgba(74,143,232,.3)}
.sa.rw{color:var(--gld);border-color:rgba(255,184,0,.3)}
.sa.bo{color:var(--vio);border-color:rgba(124,92,252,.3)}

/* CHAT LIST */
.clist{flex:1;overflow-y:auto;padding:0 12px 12px}
.ci{display:flex;align-items:center;gap:12px;padding:12px 8px;border-radius:14px;cursor:pointer}
.ci:active{background:rgba(255,255,255,.03)}
.cav{width:50px;height:50px;min-width:50px;border-radius:50%;background:var(--s1);display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;color:var(--t3);overflow:hidden;background-size:cover;background-position:center;position:relative;border:2px solid transparent}
.cav.active-now{border-color:var(--grn)}
.cav .dot{position:absolute;bottom:0;right:0;width:12px;height:12px;border-radius:50%;background:var(--grn);border:2px solid var(--bg)}
.cinf{flex:1;min-width:0}.cinm{font-size:14px;font-weight:600;color:#fff}.cipr{font-size:12px;color:var(--t3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px}
.citm{font-size:10px;color:var(--t3)}

/* CHAT SCREEN */
#CS{display:none;position:fixed;top:0;left:0;width:100%;height:100dvh;z-index:999;flex-direction:column;background:var(--bg)}
#CS.on{display:flex}
.cH{padding:8px 12px;background:var(--bg2);border-bottom:1px solid var(--brd);display:flex;align-items:center;gap:10px;flex-shrink:0}
.cH-bk{padding:6px}.cH-bk svg{width:22px;height:22px;fill:var(--t2)}
.cH-av{width:34px;height:34px;min-width:34px;border-radius:50%;background:var(--s1);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:var(--t3);overflow:hidden;background-size:cover;background-position:center;cursor:pointer}
.cH-i{flex:1;min-width:0;cursor:pointer}.cH-nm{font-size:14px;font-weight:600;color:#fff}.cH-st{font-size:11px;color:var(--grn)}
.cH-acts{display:flex;gap:4px}
.cH-b{width:32px;height:32px;border-radius:50%;background:var(--s1);display:flex;align-items:center;justify-content:center}
.cH-b svg{width:16px;height:16px;fill:var(--t2)}
.cH-b.red svg{fill:var(--ac)}
.mgs{flex:1;overflow-y:auto;padding:10px 10px 6px;display:flex;flex-direction:column;gap:3px}
.mgs::-webkit-scrollbar{width:0}
.mr{display:flex;align-items:flex-end;gap:6px;animation:mA .25s ease}.mr.me{flex-direction:row-reverse}
@keyframes mA{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.m-av{width:26px;height:26px;min-width:26px;border-radius:50%;background:var(--s1);display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:var(--t3);flex-shrink:0;overflow:hidden;background-size:cover;background-position:center;margin-bottom:14px}
.bb{max-width:75%;min-width:50px;padding:9px 13px 4px;border-radius:18px;font-size:14px;line-height:1.5;overflow-wrap:break-word}
.bb.th{background:var(--bg3);color:#fff;border-bottom-left-radius:4px}
.bb.me{background:var(--grad);color:#fff;border-bottom-right-radius:4px}
.bt{font-size:9px;opacity:.4;margin-top:2px;padding-bottom:2px}.mr.me .bt{text-align:right}
.bb img.chat-img{max-width:100%;border-radius:10px;display:block;margin-bottom:4px;cursor:pointer}
.cIw{padding:6px 10px calc(6px + var(--sb));border-top:1px solid var(--brd);background:var(--bg2);flex-shrink:0}
.cIr{display:flex;align-items:flex-end;gap:8px}
.cAt{width:38px;height:38px;border-radius:50%;background:var(--s1);display:flex;align-items:center;justify-content:center;flex-shrink:0;cursor:pointer}
.cAt svg{width:20px;height:20px;fill:var(--t2)}.cAt:active{background:var(--bg3)}
.cIn{flex:1;background:var(--bg3);border:1px solid var(--brd);border-radius:20px;padding:9px 14px;font-size:15px;color:#fff;outline:none;resize:none;max-height:100px;line-height:1.4}
.cIn::placeholder{color:var(--t3)}.cIn:focus{border-color:rgba(254,60,114,.4)}
.cSn{width:38px;height:38px;border-radius:50%;background:var(--grad);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.cSn svg{width:18px;height:18px;fill:#fff}.cSn:active{transform:scale(.88)}

/* PROFILE */
.psc{flex:1;overflow-y:auto;padding:0 14px 20px}
.ph{display:flex;flex-direction:column;align-items:center;padding:16px 0 20px}
.pav{width:90px;height:90px;border-radius:50%;background:var(--s1);display:flex;align-items:center;justify-content:center;font-size:34px;font-weight:800;color:var(--t4);border:3px solid var(--ac);position:relative;overflow:hidden;margin-bottom:10px;background-size:cover;background-position:center;cursor:pointer}
.pav .cam{position:absolute;bottom:0;right:0;width:28px;height:28px;border-radius:50%;background:var(--ac);display:flex;align-items:center;justify-content:center;border:2px solid var(--bg)}
.pav .cam svg{width:14px;height:14px;fill:#fff}
.pnm{font-size:20px;font-weight:800;color:#fff}
.pct{font-size:12px;color:var(--t3);margin-top:2px}
/* Status in profile */
.p-status{display:inline-flex;align-items:center;gap:5px;padding:4px 12px;border-radius:20px;background:rgba(47,223,132,.1);margin-top:6px;font-size:11px;font-weight:600;color:var(--grn);cursor:pointer}
.p-status::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--grn);flex-shrink:0}
.ps{margin-bottom:14px}
.psl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--t3);margin-bottom:8px;padding-left:2px}
.pr{background:var(--bg2);border:1px solid var(--brd);border-radius:12px;padding:11px 14px;margin-bottom:5px;display:flex;justify-content:space-between;align-items:center}
.prl{font-size:12px;color:var(--t2)}.prv{font-size:13px;font-weight:600;color:#fff}
.pr.ck{cursor:pointer}.pr.ck:active{background:var(--bg3)}
.pef{margin-bottom:10px}
.pef label{display:block;font-size:11px;font-weight:600;color:var(--t2);margin-bottom:4px}
.pef input,.pef textarea{width:100%;background:var(--bg3);border:1px solid var(--brd);border-radius:10px;padding:10px 12px;font-size:14px;color:#fff;outline:none}
.pef textarea{resize:none;height:70px}
.pef input:focus,.pef textarea:focus{border-color:rgba(254,60,114,.4)}
.psv{width:100%;padding:12px;border-radius:24px;font-size:14px;font-weight:700;background:var(--grad);color:#fff}
.psv:active{transform:scale(.98)}
.pout{width:100%;padding:11px;border-radius:12px;font-size:13px;font-weight:600;color:var(--ac);border:1px solid rgba(254,60,114,.2);margin-top:8px;text-align:center;background:rgba(254,60,114,.05)}
/* 6 photo grid */
.pgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:14px}
.pgrid-item{aspect-ratio:1;border-radius:10px;background:var(--bg3);border:2px dashed var(--t4);display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative;cursor:pointer}
.pgrid-item.has{border:none}
.pgrid-item img{width:100%;height:100%;object-fit:cover}
.pgrid-item .pg-del{position:absolute;top:4px;right:4px;width:22px;height:22px;border-radius:50%;background:rgba(0,0,0,.7);display:flex;align-items:center;justify-content:center;z-index:2}
.pgrid-item .pg-del svg{width:12px;height:12px;fill:#fff}
.pgrid-item .pg-add{display:flex;flex-direction:column;align-items:center;gap:4px;color:var(--t3)}
.pgrid-item .pg-add svg{width:24px;height:24px;fill:var(--t3)}.pgrid-item .pg-add span{font-size:9px;font-weight:600}
.pgallery{display:flex;gap:4px;overflow-x:auto;margin-bottom:14px;scroll-snap-type:x mandatory;-webkit-overflow-scrolling:touch;padding:0 2px}
.pgallery::-webkit-scrollbar{display:none}
.pgallery img{width:80px;height:80px;border-radius:10px;object-fit:cover;flex-shrink:0;scroll-snap-align:start;cursor:pointer}

/* PARTNER PROFILE */
#ppO{display:none;position:fixed;inset:0;z-index:1500;background:var(--bg);flex-direction:column;overflow:hidden}
#ppO.on{display:flex}
.pp-hdr{padding:10px 14px;display:flex;align-items:center;gap:10px;flex-shrink:0;background:var(--bg2);border-bottom:1px solid var(--brd)}
.pp-hdr button{padding:6px}.pp-hdr button svg{width:22px;height:22px;fill:var(--t2)}
.pp-hdr span{font-size:16px;font-weight:700;color:#fff}
.pp-body{flex:1;overflow-y:auto;padding:0 14px 30px}
.pp-photos{position:relative;width:100%;aspect-ratio:3/4;background:var(--bg3);display:flex;align-items:center;justify-content:center;border-radius:14px;overflow:hidden;margin-bottom:14px}
.pp-photos img{width:100%;height:100%;object-fit:cover}
.pp-photos .pp-ini{font-size:64px;font-weight:800;color:var(--t4)}
.pp-ph-dots{position:absolute;bottom:10px;left:50%;transform:translateX(-50%);display:flex;gap:5px}
.pp-ph-dot{width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,.35)}.pp-ph-dot.on{background:#fff}
.pp-ph-left,.pp-ph-right{position:absolute;top:0;height:100%;width:40%;z-index:2;cursor:pointer}
.pp-ph-left{left:0}.pp-ph-right{right:0}
.pp-name{font-size:24px;font-weight:800;color:#fff;margin-bottom:2px}
.pp-city{font-size:13px;color:var(--t3);margin-bottom:14px}
.pp-sec{margin-bottom:14px}
.pp-sec-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--t3);margin-bottom:6px}
.pp-bio{font-size:13px;color:var(--t2);line-height:1.6}
.pp-tags{display:flex;flex-wrap:wrap;gap:5px}
.tg{padding:4px 10px;border-radius:14px;font-size:11px;font-weight:600;background:rgba(254,60,114,.1);color:var(--ac2)}

/* CALL */
.cov{display:none;position:fixed;inset:0;z-index:9999;background:linear-gradient(180deg,#1a1a2e,#111);flex-direction:column;align-items:center;justify-content:center}
.cov.on{display:flex}
.c-av{width:90px;height:90px;border-radius:50%;background:var(--s1);display:flex;align-items:center;justify-content:center;font-size:36px;font-weight:800;color:var(--t4);position:relative;margin-bottom:16px;overflow:hidden}
.c-rng{position:absolute;inset:-8px;border-radius:50%;border:2px solid rgba(254,60,114,.2);animation:rng 2s infinite}
.c-rng2{position:absolute;inset:-18px;border-radius:50%;border:2px solid rgba(254,60,114,.1);animation:rng 2s infinite .5s}
@keyframes rng{0%{transform:scale(1);opacity:1}100%{transform:scale(1.15);opacity:0}}
.c-nm{font-size:22px;font-weight:700;color:#fff}.c-st{font-size:13px;color:var(--t2);margin-bottom:30px}
.c-tm{font-size:20px;font-weight:600;color:var(--grn);margin-bottom:24px;min-height:24px;font-variant-numeric:tabular-nums}
.c-acts{display:flex;gap:18px}
.c-rb{width:52px;height:52px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px}
.c-rb:active{transform:scale(.9)}
.c-end{background:var(--ac);color:#fff}.c-mu{background:var(--s1);border:1px solid var(--brd)}

/* FILTER */
.mbg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:800;align-items:flex-end;justify-content:center}
.mbg.on{display:flex}
.mbox{background:var(--bg2);border-radius:20px 20px 0 0;padding:16px 18px calc(16px + var(--sb));width:100%;max-width:440px;animation:shu .35s ease}
@keyframes shu{from{transform:translateY(100%)}to{transform:none}}
.mhd{width:32px;height:4px;border-radius:2px;background:var(--t4);margin:0 auto 14px}
.mt{font-size:17px;font-weight:800;color:#fff;margin-bottom:14px}
.fg{margin-bottom:14px}.fgl{font-size:11px;font-weight:600;color:var(--t2);margin-bottom:6px}
.fgc{display:flex;gap:6px}
.fc{padding:8px 14px;border-radius:18px;border:1px solid var(--brd);font-size:12px;font-weight:600;color:var(--t2)}
.fc.on{border-color:var(--ac);color:var(--ac);background:rgba(254,60,114,.08)}
.fap{width:100%;padding:12px;border-radius:24px;font-size:14px;font-weight:700;background:var(--grad);color:#fff;margin-top:4px}
.rw{display:flex;gap:8px;align-items:center;margin-top:4px}
.rw span{font-size:10px;color:var(--t3)}
.rw input[type=range]{flex:1;-webkit-appearance:none;height:3px;background:var(--t4);border-radius:2px;outline:none}
.rw input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;border-radius:50%;background:var(--ac);border:2px solid var(--bg)}

/* STATUS MODAL */
#stM{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:850;align-items:center;justify-content:center;padding:20px}
#stM.on{display:flex}
.st-box{background:var(--bg2);border-radius:20px;padding:20px;width:100%;max-width:340px}
.st-box h3{font-size:16px;font-weight:700;color:#fff;margin-bottom:12px}
.st-opts{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px}
